<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國字注音學習單產生器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 載入注音引擎 -->
    <script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.26.0/dist/index.js"></script>
    <style>
        /* 基礎中文字體設定，預設使用標準楷體系列 */
        body {
            font-family: '書法中楷', 'DFKai-SB', 'BiauKai', 'PMingLiU', 'Noto Serif TC', serif;
        }

        /* 標題直排設定 */
        .vertical-title {
            writing-mode: vertical-rl;
            text-orientation: upright;
            letter-spacing: 2px;
        }

        /* 數字在直排中橫向顯示 */
        .combine-upright {
            text-combine-upright: all;
            -webkit-text-combine: horizontal;
        }

        /* 列印相關設定 */
        @media print {
            @page { 
                size: A4 landscape; 
                margin: 0mm; 
            }
            body { 
                margin: 0; 
                padding: 0; 
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact; 
            }
            .no-print { display: none !important; }
            
            .page-container { 
                width: 297mm;
                height: 210mm;
                margin: 0;
                padding: 12mm; 
                page-break-after: always;
                break-after: page;
                box-sizing: border-box;
                box-shadow: none !important;
            }
            
            .page-container:last-child {
                page-break-after: auto;
                break-after: auto;
            }
        }

        /* 畫面預覽時的頁面樣式 */
        @media screen {
            .page-container {
                width: 297mm;
                height: 210mm;
                background: white;
                box-shadow: 0 4px 6px rgba(0,0,0,0.1);
                margin: 20px auto;
                padding: 12mm;
                position: relative;
                box-sizing: border-box;
            }
        }

        /* 可編輯格子的提示效果 */
        .editable-cell {
            outline: none;
            transition: background-color 0.2s;
        }
        @media screen {
            .editable-cell:hover, .editable-cell:focus {
                background-color: #fef08a; /* 淺黃色背景提示可編輯 */
                border-radius: 4px;
            }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 預設語詞資料庫
        const DEFAULT_WORDS = `
分寸 ㄈㄣ ㄘㄨㄣˋ
期待 ㄑㄧ ㄉㄞˋ
熱鬧 ㄖㄜˋ ㄋㄠˋ
廣場 ㄍㄨㄤˇ ㄔㄤˇ
階梯 ㄐㄧㄝ ㄊㄧ
舞蹈 ㄨˇ ㄉㄠˇ
表示 ㄅㄧㄠˇ ㄕˋ
輕快 ㄑㄧㄥ ㄎㄨㄞˋ
只是 ㄓˇ ㄕˋ
夕陽 ㄒㄧˋ ㄧㄤˊ
隨著 ㄙㄨㄟˊ ㄓㄜ˙
恐龍 ㄎㄨㄥˇ ㄌㄨㄥˊ
經過 ㄐㄧㄥ ㄍㄨㄛˋ
因為 ㄧㄣ ㄨㄟˋ
打破 ㄉㄚˇ ㄆㄛˋ
盡頭 ㄐㄧㄣˋ ㄊㄡˊ
得意 ㄉㄜˊ ㄧˋ
溫暖 ㄨㄣ ㄋㄨㄢˇ
喜愛 ㄒㄧˇ ㄞˋ
順利 ㄕㄨㄣˋ ㄌㄧˋ
合作 ㄏㄜˊ ㄗㄨㄛˋ
出生 ㄔㄨ ㄕㄥ
身高 ㄕㄣ ㄍㄠ
留下 ㄌㄧㄡˊ ㄒㄧㄚˋ
加比 ㄐㄧㄚ ㄅㄧˇ
快樂 ㄎㄨㄞˋ ㄌㄜˋ
美麗 ㄇㄟˇ ㄌㄧˋ
森林 ㄙㄣ ㄌㄧㄣˊ
海洋 ㄏㄞˇ ㄧㄤˊ
宇宙 ㄩˇ ㄓㄡˋ
星星 ㄒㄧㄥ ㄒㄧㄥ
飛翔 ㄈㄟ ㄒㄧㄤˊ
`.trim();

        const WORDS_PER_PAGE = 27; // 3列 x 9欄

        // --- 元件：國字編輯框 ---
        const EditableChar = ({ initialValue }) => {
            const [val, setVal] = useState(initialValue);
            useEffect(() => { setVal(initialValue); }, [initialValue]);
            
            return (
                <span 
                    contentEditable 
                    suppressContentEditableWarning 
                    onBlur={(e) => setVal(e.target.innerText.trim())}
                    className="editable-cell min-w-[1em] min-h-[1em] flex items-center justify-center text-center outline-none cursor-text"
                >
                    {val}
                </span>
            );
        };

        // --- 元件：智慧注音編輯與排版框 ---
        const EditableZhuyin = ({ initialValue }) => {
            const [isEditing, setIsEditing] = useState(false);
            const [val, setVal] = useState(initialValue);
            const inputRef = useRef(null);

            useEffect(() => { setVal(initialValue); }, [initialValue]);

            useEffect(() => {
                if (isEditing && inputRef.current) {
                    inputRef.current.focus();
                    try {
                        const range = document.createRange();
                        const sel = window.getSelection();
                        range.selectNodeContents(inputRef.current);
                        range.collapse(false);
                        sel.removeAllRanges();
                        sel.addRange(range);
                    } catch(e) {}
                }
            }, [isEditing]);

            const handleBlur = (e) => {
                setIsEditing(false);
                setVal(e.target.innerText.trim());
            };

            if (isEditing) {
                return (
                    <div 
                        ref={inputRef}
                        contentEditable
                        suppressContentEditableWarning
                        onBlur={handleBlur}
                        className="w-full h-full flex items-center justify-center text-center text-[13px] bg-yellow-100 outline-none rounded"
                        style={{ writingMode: 'vertical-rl' }}
                    >
                        {val}
                    </div>
                );
            }

            // 顯示模式排版
            let tone = '';
            let letters = val || '';
            let isLight = false;

            if (letters.includes('˙')) {
                tone = '˙';
                letters = letters.replace('˙', '');
                isLight = true;
            } else {
                for (let t of ['ˊ', 'ˇ', 'ˋ']) {
                    if (letters.includes(t)) {
                        tone = t;
                        letters = letters.replace(t, '');
                        break;
                    }
                }
            }

            return (
                <div 
                    className="editable-cell relative flex flex-col items-center justify-center w-full h-full cursor-text"
                    onClick={() => setIsEditing(true)}
                >
                    {isLight && <span className="absolute top-[4px] left-1/2 -translate-x-1/2 -ml-[3px] leading-none font-bold text-[14px]">˙</span>}
                    
                    <div className="flex flex-col items-center justify-center text-[14px] leading-[1.1] transform -translate-x-[3px]">
                        {letters.split('').map((c, i) => <span key={i} className="block">{c}</span>)}
                    </div>
                    
                    {!isLight && tone && (
                        <span className="absolute right-[2px] top-1/2 -translate-y-1/2 leading-none font-bold text-[15px]">
                            {tone}
                        </span>
                    )}
                </div>
            );
        };

        const CropMark = ({ position }) => {
            const offset = '8mm';
            const getStyle = () => {
                switch(position) {
                    case 'top-left': return { top: offset, left: offset, transform: 'rotate(0deg)' };
                    case 'top-right': return { top: offset, right: offset, transform: 'rotate(90deg)' };
                    case 'bottom-right': return { bottom: offset, right: offset, transform: 'rotate(180deg)' };
                    case 'bottom-left': return { bottom: offset, left: offset, transform: 'rotate(270deg)' };
                }
            };
            return (
                <div className="absolute" style={getStyle()}>
                    <svg width="30" height="30" viewBox="0 0 30 30" fill="none" stroke="#999" strokeWidth="1">
                        <path d="M10 0 L10 10 L0 10" />
                    </svg>
                </div>
            );
        };

        const App = () => {
            const [academicYear, setAcademicYear] = useState('114');
            const [schoolName, setSchoolName] = useState('裕文國小');
            const [grade, setGrade] = useState('三');
            const [rawWords, setRawWords] = useState(DEFAULT_WORDS);
            const [pagesData, setPagesData] = useState([]);
            const [customFontName, setCustomFontName] = useState('');
            const [isAnnotating, setIsAnnotating] = useState(false);

            // 處理自訂字型上傳
            const handleFontUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const fontUrl = URL.createObjectURL(file);
                const fontId = 'CustomFont_' + Date.now();

                // 動態注入字型 CSS
                const newStyle = document.createElement('style');
                newStyle.appendChild(document.createTextNode(`
                    @font-face {
                        font-family: '${fontId}';
                        src: url('${fontUrl}');
                    }
                    /* 強制所有文字套用新上傳的字體 */
                    body, .editable-cell, .vertical-title, .print-area {
                        font-family: '${fontId}', 'DFKai-SB', 'BiauKai', serif !important;
                    }
                `));
                document.head.appendChild(newStyle);
                setCustomFontName(file.name);
            };

            // 嚴謹判斷是否包含注音符號 (ㄅ-ㄩ 範圍)
            const hasBopomofo = (str) => /[\u3105-\u312F]/.test(str);

            // 自動標註注音功能 (100% 過濾錯誤的拼音，只輸出ㄅㄆㄇㄈ)
            const handleAutoAnnotate = () => {
                if (!window.pinyinPro) {
                    alert("注音轉換套件尚未載入，請確認您的網路是否有阻擋，或稍等幾秒後再試。");
                    return;
                }
                
                setIsAnnotating(true); // 觸發按鈕視覺回饋

                setTimeout(() => {
                    const { bopomofo, pinyin } = window.pinyinPro;
                    const lines = rawWords.split('\n');
                    
                    const newLines = lines.map(line => {
                        const trimmed = line.trim();
                        // 如果這行已經有空白 (代表您已經幫它加過注音了)，就跳過不要覆蓋
                        if (!trimmed || trimmed.includes(' ') || trimmed.includes('\t')) return trimmed;
                        
                        // 確保只有抓到長度為 2 的詞彙才進行處理
                        const word = trimmed.substring(0, 2);
                        if (word.length !== 2) return trimmed;
                        
                        try {
                            let zyArray = [];
                            
                            // 優先呼叫原生的 bopomofo API (最精準)
                            if (typeof bopomofo === 'function') {
                                let result = bopomofo(word, { type: 'array' });
                                if (typeof result === 'string') zyArray = result.split(' ');
                                else zyArray = result;
                            } else if (typeof pinyin === 'function') {
                                zyArray = pinyin(word, { pattern: 'bopomofo', type: 'array' });
                            }

                            let zy1 = zyArray[0] || '';
                            let zy2 = zyArray[1] || '';
                            
                            // 【最強防呆機制】只要轉換出來的字串裡面沒有「ㄅㄆㄇㄈ」，就代表轉換失敗，直接清空讓老師手動打！
                            if (zy1 && !hasBopomofo(zy1)) zy1 = '';
                            if (zy2 && !hasBopomofo(zy2)) zy2 = '';
                            
                            return `${word} ${zy1} ${zy2}`.trim();
                        } catch (e) {
                            console.error("轉換失敗：", e);
                            return trimmed;
                        }
                    });
                    
                    setRawWords(newLines.join('\n'));
                    setIsAnnotating(false); // 結束按鈕視覺回饋
                }, 50); // 微小的延遲確保畫面有重繪
            };

            const generateWorksheet = () => {
                const lines = rawWords.split('\n').map(l => l.trim()).filter(Boolean);
                let parsedWords = lines.map(line => {
                    const parts = line.split(/[\s\t]+/);
                    // 完全信任文字框的內容，沒有注音就留白
                    if (parts.length >= 1) {
                        return { word: parts[0], zy1: parts[1] || '', zy2: parts[2] || '' };
                    }
                    return null;
                }).filter(item => item && item.word.length >= 2);

                parsedWords.sort(() => Math.random() - 0.5);

                const configuredWords = parsedWords.map(item => ({
                    ...item,
                    mode: Math.random() > 0.5 ? 0 : 1 
                }));

                const chunks = [];
                for (let i = 0; i < configuredWords.length; i += WORDS_PER_PAGE) {
                    chunks.push(configuredWords.slice(i, i + WORDS_PER_PAGE));
                }
                setPagesData(chunks);
            };

            const saveToFile = () => {
                const data = { academicYear, schoolName, grade, rawWords };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${academicYear}學年度_${schoolName}_${grade}年級_國字注音題庫.json`;
                a.click();
                URL.revokeObjectURL(url);
            };

            const loadFromFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if(data.academicYear) setAcademicYear(data.academicYear);
                        if(data.schoolName) setSchoolName(data.schoolName);
                        if(data.grade) setGrade(data.grade);
                        if(data.rawWords) setRawWords(data.rawWords);
                        e.target.value = null;
                    } catch(err) {
                        alert("讀取失敗，請確認是否為本系統產生的存檔檔案！");
                    }
                };
                reader.readAsText(file);
            };

            useEffect(() => {
                generateWorksheet();
            }, []);

            return (
                <div>
                    <div className="no-print bg-white p-6 shadow-md mb-8 max-w-5xl mx-auto rounded-lg mt-6 border-t-4 border-blue-500">
                        <h1 className="text-2xl font-bold mb-4 flex items-center gap-2">
                            <span>📝</span> 國字注音學習單產生器
                        </h1>
                        
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            {/* 左側設定區 */}
                            <div className="col-span-1 space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">學年度</label>
                                    <input type="text" value={academicYear} onChange={e => setAcademicYear(e.target.value)} className="w-full border rounded p-2 focus:ring-2 focus:ring-blue-300" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">學校名稱</label>
                                    <input type="text" value={schoolName} onChange={e => setSchoolName(e.target.value)} className="w-full border rounded p-2 focus:ring-2 focus:ring-blue-300" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">年級</label>
                                    <select value={grade} onChange={e => setGrade(e.target.value)} className="w-full border rounded p-2 focus:ring-2 focus:ring-blue-300">
                                        <option value="一">一年級</option>
                                        <option value="二">二年級</option>
                                        <option value="三">三年級</option>
                                        <option value="四">四年級</option>
                                        <option value="五">五年級</option>
                                        <option value="六">六年級</option>
                                    </select>
                                </div>
                                
                                {/* 自訂字型上傳區 */}
                                <div className="pt-4 border-t border-gray-200 mt-2">
                                    <label className="block text-sm font-bold text-blue-700 mb-1">
                                        🔤 載入自訂字型檔 (可選)
                                    </label>
                                    <p className="text-xs text-gray-500 mb-2">上傳電腦中的「書法中楷.ttf」確保字體完美呈現。</p>
                                    <label className="flex items-center justify-center w-full px-4 py-2 bg-white text-blue-600 rounded shadow-sm border border-blue-300 cursor-pointer hover:bg-blue-50 transition-colors">
                                        <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                                        </svg>
                                        <span className="text-sm font-bold truncate max-w-[150px]">{customFontName || '選擇字型檔案 (.ttf/.otf)'}</span>
                                        <input type='file' className="hidden" accept=".ttf,.otf,.woff,.woff2" onChange={handleFontUpload} />
                                    </label>
                                </div>
                            </div>

                            {/* 右側語詞輸入區 */}
                            <div className="col-span-2 flex flex-col">
                                <label className="block text-sm font-medium text-gray-700 mb-1">
                                    語詞資料庫 (格式：<code className="bg-gray-100 px-1 rounded">詞彙 注音1 注音2</code>，請用空白分隔)
                                </label>
                                <textarea 
                                    value={rawWords}
                                    onChange={e => setRawWords(e.target.value)}
                                    className="w-full flex-grow border rounded p-2 font-mono text-sm focus:ring-2 focus:ring-blue-300 h-48"
                                    placeholder="可以貼上完整格式：\n分寸 ㄈㄣ ㄘㄨㄣˋ\n\n或直接輸入詞彙：\n分寸\n期待\n熱鬧"
                                ></textarea>
                                
                                <div className="mt-4 flex flex-col gap-3">
                                    <div className="flex flex-wrap gap-3 items-center">
                                        <div className="text-sm text-red-600 font-bold mr-auto flex items-center gap-1 bg-red-50 px-2 py-1 rounded">
                                            <span>💡</span> 提示：輸入完詞彙後，請依照下方步驟點擊按鈕！
                                        </div>
                                        
                                        <button 
                                            onClick={saveToFile}
                                            className="bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded shadow flex items-center gap-2 transition-colors text-sm"
                                        >
                                            <span>💾</span> 存檔下載
                                        </button>
                                        
                                        <label className="bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded shadow flex items-center gap-2 transition-colors cursor-pointer text-sm mb-0">
                                            <span>📂</span> 讀取存檔
                                            <input type="file" accept=".json" onChange={loadFromFile} className="hidden" />
                                        </label>
                                    </div>

                                    <div className="flex flex-wrap gap-4 justify-end border-t pt-3 border-gray-200">
                                        {/* 步驟一：自動標註 */}
                                        <button 
                                            onClick={handleAutoAnnotate}
                                            disabled={isAnnotating}
                                            className={`${isAnnotating ? 'bg-yellow-400 cursor-wait' : 'bg-yellow-500 hover:bg-yellow-600'} text-white font-bold py-2 px-4 rounded shadow flex items-center gap-2 transition-colors mr-auto`}
                                        >
                                            <span>✨</span> {isAnnotating ? '標註中...' : '步驟一：自動標註注音'}
                                        </button>

                                        {/* 步驟二：重整產生 */}
                                        <button 
                                            onClick={generateWorksheet}
                                            className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded shadow flex items-center gap-2 transition-colors"
                                        >
                                            <span>🔄</span> 步驟二：重整並產生學習單
                                        </button>
                                        <button 
                                            onClick={() => window.print()}
                                            className="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded shadow flex items-center gap-2 transition-colors"
                                        >
                                            <span>🖨️</span> 列印
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* 列印預覽區 */}
                    <div className="print-area font-serif bg-gray-200 py-4">
                        {pagesData.map((pageWords, pageIndex) => {
                            const pageLetter = String.fromCharCode(65 + pageIndex);

                            return (
                                <div key={pageIndex} className="page-container flex items-center justify-center relative bg-white">
                                    <CropMark position="top-left" />
                                    <CropMark position="top-right" />
                                    <CropMark position="bottom-left" />
                                    <CropMark position="bottom-right" />

                                    <div className="flex w-full h-full px-4 py-8">
                                        
                                        {/* 左側：語詞九宮格區 */}
                                        <div className="flex-1 flex flex-col justify-between">
                                            {[0, 1, 2].map(rowIndex => (
                                                <div key={rowIndex} className="flex justify-between w-full pr-12">
                                                    {[...Array(9)].map((_, colIndex) => {
                                                        const dataIndex = rowIndex * 9 + (8 - colIndex);
                                                        const wordData = pageWords[dataIndex];

                                                        if (!wordData) {
                                                            return <div key={colIndex} className="w-[5rem] shrink-0"></div>; 
                                                        }

                                                        const { word, zy1, zy2, mode } = wordData;
                                                        const char1 = word.charAt(0);
                                                        const char2 = word.charAt(1);

                                                        const showChar1 = mode === 1;
                                                        const showZy1 = mode === 0;
                                                        const showChar2 = mode === 0;
                                                        const showZy2 = mode === 1;

                                                        return (
                                                            <div key={colIndex} className="flex flex-col items-center gap-1 shrink-0">
                                                                <div className="w-[5rem] h-[10rem] border border-black flex flex-col shrink-0 box-border bg-white">
                                                                    
                                                                    {/* 上方字塊 */}
                                                                    <div className="flex w-full h-[5rem] border-b border-black shrink-0 box-border">
                                                                        <div className="w-[3.25rem] border-r border-black flex items-center justify-center text-5xl shrink-0">
                                                                            {showChar1 ? <EditableChar initialValue={char1} /> : null}
                                                                        </div>
                                                                        <div className="w-[1.75rem] flex items-center justify-center shrink-0 relative">
                                                                            {showZy1 ? <EditableZhuyin initialValue={zy1} /> : null}
                                                                        </div>
                                                                    </div>
                                                                    
                                                                    {/* 下方字塊 */}
                                                                    <div className="flex w-full h-[5rem] shrink-0 box-border">
                                                                        <div className="w-[3.25rem] border-r border-black flex items-center justify-center text-5xl shrink-0">
                                                                            {showChar2 ? <EditableChar initialValue={char2} /> : null}
                                                                        </div>
                                                                        <div className="w-[1.75rem] flex items-center justify-center shrink-0 relative">
                                                                            {showZy2 ? <EditableZhuyin initialValue={zy2} /> : null}
                                                                        </div>
                                                                    </div>
                                                                    
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            ))}
                                        </div>

                                        {/* 右側：直排標題區 (調整格式與順序) */}
                                        <div className="w-16 flex justify-center items-start pt-2">
                                            <div className="vertical-title text-[19px] font-bold text-gray-800 leading-tight flex items-center">
                                                <span className="combine-upright">{academicYear}</span> 學年度{schoolName} {grade}年級 國語學習單 寫國字注音 {pageLetter}
                                            </div>
                                        </div>

                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
